<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GopexFund — About Us</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--p:#1a6eff;--plt:#eef4ff;--pbr:#bdd1ff;--pdk:#0f4dd4;--green:#16a34a;--gbg:#dcfce7;--white:#fff;--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g500:#64748b;--g900:#0f172a;--bg:#f0f4f9;--bdr:#e2e8f0;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--fd:'Plus Jakarta Sans',sans-serif;--fb:'Inter',sans-serif;--sh:0 1px 3px rgba(0,0,0,.07);--shm:0 4px 16px rgba(0,0,0,.08);}
*{margin:0;padding:0;box-sizing:border-box;}html,body{font-family:var(--fb);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;}a{text-decoration:none;color:inherit;}button{cursor:pointer;}
.nav{position:fixed;top:0;left:0;right:0;z-index:300;height:60px;display:flex;align-items:center;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);}
.nav-in{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1280px;margin:0 auto;padding:0 24px;}
.logo{font-family:var(--fd);font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;}.logo-mark{width:29px;height:29px;background:var(--p);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;}
.nav-links{display:flex;gap:2px;}.nl{padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--g500);text-decoration:none;transition:all .15s;}.nl:hover{background:var(--g100);color:var(--tx);}.nl.on{background:var(--plt);color:var(--p);font-weight:600;}
.burger{display:none;background:none;border:none;font-size:22px;color:var(--g500);cursor:pointer;padding:4px;}
.mob-nav{display:none;position:fixed;top:60px;left:0;right:0;background:#fff;border-bottom:1px solid var(--bdr);padding:10px 16px 14px;flex-direction:column;gap:4px;z-index:299;box-shadow:var(--shm);}
.mob-nav.open{display:flex;}.mob-link{padding:10px 14px;border-radius:9px;font-size:14px;font-weight:500;color:var(--tx2);text-decoration:none;}
.pg{padding:78px clamp(16px,5vw,60px) 80px;max-width:960px;margin:0 auto;}
/* Hero */
.ab-hero{text-align:center;padding:52px 20px 60px;}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--plt);color:var(--p);border:1px solid var(--pbr);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:600;margin-bottom:16px;}
.ab-h1{font-family:var(--fd);font-size:clamp(28px,5vw,50px);font-weight:800;letter-spacing:-1.5px;color:var(--g900);margin-bottom:12px;line-height:1.1;}
.ab-h1 span{color:var(--p);}
.ab-sub{font-size:clamp(14px,1.8vw,17px);color:var(--tx2);line-height:1.7;max-width:520px;margin:0 auto;}
/* Cards */
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:0 0 56px;}
.ab-card{background:var(--white);border:1px solid var(--bdr);border-radius:16px;padding:26px;box-shadow:var(--sh);transition:all .2s;}
.ab-card:hover{box-shadow:var(--shm);transform:translateY(-3px);border-color:var(--g300);}
.ac-ico{font-size:30px;margin-bottom:14px;}
.ac-title{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:7px;}
.ac-desc{font-size:13px;color:var(--tx2);line-height:1.7;}
/* Stats banner */
.stats-banner{background:linear-gradient(135deg,var(--p),var(--pdk));border-radius:18px;padding:36px 32px;color:#fff;margin-bottom:56px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center;}
.st-num{font-family:var(--fd);font-size:clamp(22px,4vw,34px);font-weight:800;margin-bottom:4px;}
.st-lbl{font-size:12px;opacity:.75;}
/* CTA */
.cta-box{background:var(--plt);border:1px solid var(--pbr);border-radius:18px;padding:48px;text-align:center;}
.cta-h{font-family:var(--fd);font-size:clamp(22px,3vw,32px);font-weight:800;letter-spacing:-.5px;margin-bottom:10px;}
.cta-sub{font-size:16px;color:var(--tx2);margin-bottom:28px;}
.btn-cta{display:inline-block;background:var(--p);color:#fff;padding:13px 32px;border-radius:10px;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(26,110,255,.28);transition:all .2s;}
.btn-cta:hover{background:var(--pdk);transform:translateY(-2px);}
footer{background:var(--g900);color:var(--g500);padding:36px clamp(16px,4vw,48px);}
.footer-in{max-width:960px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
@media(max-width:768px){.nav-links{display:none;}.burger{display:block;}.cards3{grid-template-columns:1fr;}.stats-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.stats-banner{padding:24px 18px;}.cta-box{padding:32px 20px;}}
</style>
</head>

      <div><div class="st-num">₦2.3B</div><div class="st-lbl">Assets tracked</div></div>

  </div>
  <div class="cta-box">
    <div class="cta-h">Ready to start your journey?</div>
    <div class="cta-sub">Join thousands of African investors building wealth together on GopexFund.</div>
    <a href="landing.html" class="btn-cta">Get started free →</a>
  </div>
</div>
<footer><div class="footer-in"><div><div style="font-family:var(--fd);font-size:17px;font-weight:800;color:#fff;margin-bottom:3px;">GopexFund</div><div style="font-size:12px;">Africa's social wealth-building platform · Lagos</div></div><div style="font-size:12px;">© 2026 GopexFund</div></div></footer>
</body>
