<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GopexFund — My Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--p:#1a6eff;--plt:#eef4ff;--pbr:#bdd1ff;--pdk:#0f4dd4;--green:#16a34a;--gbg:#dcfce7;--gbr:#86efac;--red:#dc2626;--rbg:#fee2e2;--amber:#d97706;--ambg:#fef3c7;--purple:#7c3aed;--pbg:#ede9fe;--white:#fff;--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g900:#0f172a;--bg:#f0f4f9;--surf:#fff;--bdr:#e2e8f0;--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--fd:'Plus Jakarta Sans',sans-serif;--fb:'Inter',sans-serif;--sh:0 1px 3px rgba(0,0,0,.07);--shm:0 4px 16px rgba(0,0,0,.08);}
*{margin:0;padding:0;box-sizing:border-box;}html,body{font-family:var(--fb);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100vh;}a{text-decoration:none;color:inherit;}button{cursor:pointer;font-family:var(--fb);}input,select{font-family:var(--fb);}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:300;height:60px;display:flex;align-items:center;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);}
.nav-in{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1280px;margin:0 auto;padding:0 24px;gap:12px;}
.logo{font-family:var(--fd);font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--tx);}
.logo-mark{width:29px;height:29px;background:var(--p);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;}
.nav-links{display:flex;gap:2px;}
.nl{padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--g500);text-decoration:none;transition:all .15s;}
.nl:hover{background:var(--g100);color:var(--tx);}
.nl.on{background:var(--plt);color:var(--p);font-weight:600;}
.nav-r{display:flex;align-items:center;gap:8px;}
.nav-prof{display:flex;align-items:center;gap:8px;background:var(--g50);border:1px solid var(--bdr);border-radius:10px;padding:4px 12px 4px 5px;text-decoration:none;transition:all .15s;}
.nav-prof:hover{background:var(--g100);}
.nav-av{width:28px;height:28px;border-radius:50%;background:var(--plt);color:var(--p);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.burger{display:none;background:none;border:none;font-size:22px;color:var(--g500);cursor:pointer;padding:4px;}
.mob-nav{display:none;position:fixed;top:60px;left:0;right:0;background:#fff;border-bottom:1px solid var(--bdr);padding:10px 16px 14px;flex-direction:column;gap:4px;z-index:299;box-shadow:var(--shm);}
.mob-nav.open{display:flex;}
.mob-link{padding:10px 14px;border-radius:9px;font-size:14px;font-weight:500;color:var(--tx2);text-decoration:none;}
.mob-link.on{color:var(--p);background:var(--plt);font-weight:600;}

/* ── PAGE ── */
.pg{padding:74px clamp(12px,3vw,24px) 60px;max-width:1280px;margin:0 auto;}

/* ── HERO BANNER ── */
.hero{background:linear-gradient(135deg,var(--p) 0%,var(--pdk) 50%,#0a3db8 100%);border-radius:18px;padding:28px 32px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start;}
.hero-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.vbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid;}
.badge-v{background:rgba(22,163,74,.2);border-color:rgba(134,239,172,.5);color:#86efac;}
.badge-uv{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.4);color:#fbbf24;}
.hero-name{font-size:13px;opacity:.75;}
.hero-lbl{font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;margin-top:10px;}
.hero-amount{font-family:var(--fd);font-size:clamp(32px,5vw,48px);font-weight:800;letter-spacing:-1.5px;line-height:1;margin-bottom:10px;}
.hero-amount em{font-size:clamp(20px,3.5vw,28px);opacity:.7;font-style:normal;}
.pnl-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pnl{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid;}
.pnl-up{background:rgba(22,163,74,.18);border-color:rgba(134,239,172,.4);color:#86efac;}
.pnl-dn{background:rgba(220,38,38,.18);border-color:rgba(252,165,165,.4);color:#fca5a5;}
.period-row{display:flex;gap:4px;}
.ptog{padding:5px 13px;border-radius:7px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);transition:all .18s;}
.ptog.on{background:rgba(255,255,255,.22);color:#fff;border-color:rgba(255,255,255,.4);}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;min-width:230px;}
.hs{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;}
.hs-val{font-family:var(--fd);font-size:18px;font-weight:800;margin-bottom:2px;}
.hs-lbl{font-size:10px;opacity:.65;}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;margin-bottom:22px;}

/* ── HOLDINGS TABLE ── */
.table-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;box-shadow:var(--sh);}
.tc-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bdr);}
.tc-title{font-family:var(--fd);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.tc-add{background:var(--plt);border:1px solid var(--pbr);color:var(--p);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;transition:all .18s;}
.tc-add:hover{background:var(--p);color:#fff;}
.tbl-cols{display:grid;grid-template-columns:34px 2.2fr 1fr 1fr 1fr 1fr 80px;gap:8px;padding:8px 18px;background:var(--g50);border-bottom:1px solid var(--bdr);}
.th{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;}
.th-r{text-align:right;}
.holding-row{display:grid;grid-template-columns:34px 2.2fr 1fr 1fr 1fr 1fr 80px;gap:8px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--bdr);transition:background .12s;}
.holding-row:last-child{border:none;}
.holding-row:hover{background:var(--g50);}
.h-logo{width:32px;height:32px;border-radius:8px;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--g500);}
.h-name{font-size:12px;font-weight:700;color:var(--tx);}
.h-tk{font-size:10px;color:var(--tx3);margin-top:1px;font-family:monospace;}
.h-num{font-size:12px;font-weight:700;text-align:right;}
.h-sm{font-size:11px;color:var(--tx2);text-align:right;}
.h-xs{font-size:10px;color:var(--tx3);text-align:right;}
.up{color:var(--green);}
.dn{color:var(--red);}
.del-btn{background:var(--rbg);border:none;color:var(--red);width:28px;height:28px;border-radius:6px;font-size:13px;display:flex;align-items:center;justify-content:center;margin-left:auto;}
.del-btn:hover{background:var(--red);color:#fff;}
.empty-state{padding:40px;text-align:center;color:var(--tx3);}
.empty-ico{font-size:36px;margin-bottom:12px;}
.empty-txt{font-size:13px;font-weight:500;margin-bottom:14px;}
/* Add row form */
.add-row-form{background:var(--plt);border-top:1px solid var(--pbr);padding:12px 18px;display:none;}
.add-row-form.open{display:block;}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:end;}
.af-field{display:flex;flex-direction:column;gap:4px;}
.af-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;}
.af-input{background:var(--white);border:1.5px solid var(--pbr);color:var(--tx);padding:8px 11px;border-radius:8px;font-size:13px;outline:none;}
.af-input:focus{border-color:var(--p);}
.af-select{background:var(--white);border:1.5px solid var(--pbr);color:var(--tx);padding:8px 11px;border-radius:8px;font-size:13px;outline:none;}
.add-btn{background:var(--p);border:none;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;white-space:nowrap;}

/* ── RIGHT COLUMN ── */
.right-col{display:flex;flex-direction:column;gap:16px;}
.side-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:16px;box-shadow:var(--sh);}
.sc-title{font-family:var(--fd);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.donut-wrap{position:relative;height:180px;display:flex;justify-content:center;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.dc-val{font-family:var(--fd);font-size:18px;font-weight:800;}
.dc-lbl{font-size:10px;color:var(--tx3);}
.alloc-legend{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.al-item{display:flex;align-items:center;gap:6px;font-size:11px;}
.al-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.al-name{color:var(--tx2);}
.al-pct{color:var(--tx);font-weight:700;margin-left:auto;}
/* Summary stats */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sum-card{background:var(--g50);border-radius:10px;padding:10px 12px;}
.sum-val{font-family:var(--fd);font-size:15px;font-weight:800;margin-bottom:2px;}
.sum-lbl{font-size:10px;color:var(--tx3);}

/* ── PERFORMANCE CHART ── */
.perf-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:18px;box-shadow:var(--sh);margin-bottom:22px;}
.perf-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.perf-title{font-family:var(--fd);font-size:14px;font-weight:700;}
.perf-periods{display:flex;gap:4px;}
.pp{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1.5px solid var(--bdr);background:transparent;color:var(--tx3);}
.pp.on{background:var(--plt);border-color:var(--pbr);color:var(--p);}
.perf-chart-wrap{height:180px;}

/* ── GOALS ── */
.goals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
.goal-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:18px;box-shadow:var(--sh);}
.gc-ico{font-size:28px;margin-bottom:10px;}
.gc-name{font-family:var(--fd);font-size:14px;font-weight:700;margin-bottom:2px;}
.gc-target{font-size:11px;color:var(--tx3);margin-bottom:10px;}
.gc-prog{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.gc-bar{background:var(--g200);border-radius:4px;height:6px;overflow:hidden;margin-bottom:6px;}
.gc-fill{height:100%;border-radius:4px;transition:width .6s;}
.gc-monthly{font-size:11px;color:var(--tx3);}

/* ── BROKERAGES ── */
.brok-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.brok-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.brok-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:18px;box-shadow:var(--sh);transition:all .2s;}
.brok-card:hover{box-shadow:var(--shm);border-color:var(--g300);}
.brok-card.connected{border-color:var(--gbr);background:#fafffe;}
.brok-hd{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.brok-logo{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;border:1px solid var(--bdr);}
.brok-name{font-family:var(--fd);font-size:14px;font-weight:700;}
.brok-sub{font-size:11px;color:var(--tx3);margin-top:1px;}
.brok-tags{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.btag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--g100);color:var(--g500);font-weight:500;}
.brok-btn{width:100%;padding:9px;border-radius:9px;font-size:13px;font-weight:700;border:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.brok-btn-connect{background:var(--plt);color:var(--p);border:1px solid var(--pbr);}
.brok-btn-connect:hover{background:var(--p);color:#fff;}
.brok-btn-synced{background:var(--gbg);color:var(--green);border:1px solid var(--gbr);}
.connecting{opacity:.7;pointer-events:none;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:18px;padding:26px;width:100%;max-width:380px;margin:16px;position:relative;transform:translateY(10px);transition:transform .2s;box-shadow:0 20px 60px rgba(0,0,0,.14);}
.modal-ov.open .modal{transform:translateY(0);}
.modal-title{font-family:var(--fd);font-size:17px;font-weight:800;margin-bottom:18px;}
.field{margin-bottom:12px;}.field label{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.field input,.field select{width:100%;background:var(--g50);border:1.5px solid var(--bdr);color:var(--tx);padding:9px 12px;border-radius:9px;font-size:13px;outline:none;}
.field input:focus,.field select:focus{border-color:var(--p);}
.modal-btns{display:flex;gap:8px;margin-top:6px;}
.modal-cancel{flex:1;background:var(--g100);border:none;color:var(--tx2);padding:11px;border-radius:9px;font-size:13px;font-weight:600;}
.modal-save{flex:2;background:var(--p);border:none;color:#fff;padding:11px;border-radius:9px;font-size:13px;font-weight:700;}

/* RESPONSIVE */
@media(max-width:1100px){.main-grid{grid-template-columns:1fr;}.tbl-cols,.holding-row{grid-template-columns:32px 2fr 1fr 1fr 1fr 72px;}.tbl-cols .th:nth-child(6),.holding-row .h-sm:nth-child(6){display:none;}}
@media(max-width:900px){.goals-grid{grid-template-columns:1fr 1fr;}.nav-links{display:none;}.burger{display:block;}.hero-inner{grid-template-columns:1fr;}.hero-stats{display:none;}}
@media(max-width:768px){.tbl-cols,.holding-row{grid-template-columns:32px 2fr 1fr 1fr 72px;}.tbl-cols .th:nth-child(5),.holding-row div:nth-child(5){display:none;}.add-form-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.goals-grid{grid-template-columns:1fr;}.brok-grid{grid-template-columns:1fr;}.summary-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.pg{padding-left:12px;padding-right:12px;}.hero{padding:20px;}.tbl-cols,.holding-row{grid-template-columns:30px 2fr 1fr 72px;}.tbl-cols .th:nth-child(4),.holding-row div:nth-child(4){display:none;}}
</style>
</head>

<script>
<nav class="nav">
  <div class="nav-in">
    <a href="landing.html" class="logo"><div class="logo-mark">G</div>GopexFund</a>
    <div class="nav-links">
      <a href="home.html" class="nl">🏠 Home</a>
      <a href="market.html" class="nl">📈 Market</a>
      <a href="portfolio.html" class="nl on">💼 Portfolio</a>
      <a href="learn.html" class="nl">📚 Learn</a>
      <a href="about.html" class="nl">ℹ About</a>
    </div>
    <div class="nav-r">
      <a href="profile.html" class="nav-prof">
        <div class="nav-av" id="nav-av">AO</div>
        <span style="font-size:12px;font-weight:600;" id="nav-name">Adaeze</span>
      </a>
      <button class="burger" onclick="document.getElementById('mn').classList.toggle('open')">☰</button>
    </div>
  </div>
</nav>
<div class="mob-nav" id="mn">
  <a href="home.html" class="mob-link">🏠 Home</a>
  <a href="market.html" class="mob-link">📈 Market</a>
  <a href="portfolio.html" class="mob-link on">💼 Portfolio</a>
  <a href="learn.html" class="mob-link">📚 Learn</a>
  <a href="profile.html" class="mob-link">👤 Profile</a>
</div>

<div class="pg">

  <!-- HERO BANNER -->
  <div class="hero">
    <div class="hero-inner">
      <div>
        <div class="hero-eyebrow">
          <span class="vbadge" id="v-badge">✓ Verified Portfolio</span>
          <span class="hero-name" id="hero-name">Adaeze Obi</span>
        </div>
        <div class="hero-lbl">Total Portfolio Value</div>
        <div class="hero-amount"><em>₦</em><span id="hero-amt">4,823,500</span></div>
        <div class="pnl-chips">
          <div class="pnl pnl-up" id="pnl-chip">▲ +₦142,300 (+3.04%) today</div>
        </div>
        <div class="period-row">
          <button class="ptog on" onclick="setPeriod('1D',this)">1D</button>
          <button class="ptog" onclick="setPeriod('1W',this)">1W</button>
          <button class="ptog" onclick="setPeriod('1M',this)">1M</button>
          <button class="ptog" onclick="setPeriod('All',this)">All</button>
        </div>
      </div>
      <div class="hero-stats">
        <div class="hs"><div class="hs-val">+₦482K</div><div class="hs-lbl">Total Gain</div></div>
        <div class="hs"><div class="hs-val">+17.6%</div><div class="hs-lbl">Return %</div></div>
        <div class="hs"><div class="hs-val">8</div><div class="hs-lbl">Holdings</div></div>
        <div class="hs"><div class="hs-val">18mo</div><div class="hs-lbl">Invested</div></div>
      </div>
    </div>
  </div>

  <!-- MAIN GRID: Holdings + Right col -->
  <div class="main-grid">

    <!-- HOLDINGS TABLE -->
    <div class="table-card">
      <div class="tc-hd">
        <div class="tc-title">💼 Holdings <span style="font-size:11px;background:var(--g100);color:var(--g500);padding:2px 7px;border-radius:5px;font-weight:600;" id="holding-count">8 stocks</span></div>
        <button class="tc-add" onclick="toggleAddForm()">+ Add holding</button>
      </div>

      <!-- Add form -->
      <div class="add-row-form" id="add-form">
        <div class="add-form-grid">
          <div class="af-field"><div class="af-lbl">Ticker</div><input class="af-input" id="af-tk" placeholder="e.g. MTNN"/></div>
          <div class="af-field"><div class="af-lbl">Company</div><input class="af-input" id="af-name" placeholder="e.g. MTN Nigeria"/></div>
          <div class="af-field"><div class="af-lbl">Shares</div><input class="af-input" id="af-shares" type="number" placeholder="e.g. 500"/></div>
          <div class="af-field"><div class="af-lbl">Buy Price (₦)</div><input class="af-input" id="af-price" type="number" placeholder="e.g. 215.00"/></div>
          <button class="add-btn" onclick="addHolding()">Add</button>
        </div>
      </div>

      <div class="tbl-cols">
        <div class="th"></div>
        <div class="th">Company</div>
        <div class="th th-r">Price</div>
        <div class="th th-r">1D Chg</div>
        <div class="th th-r">Mkt Val</div>
        <div class="th th-r">P&amp;L</div>
        <div class="th th-r">Action</div>
      </div>
      <div id="holdings-body"></div>
    </div>

    <!-- RIGHT COL -->
    <div class="right-col">

// ─── RENDER HOLDINGS ───────────────────────────
function renderHoldings(){
  const body=document.getElementById('holdings-body');
  if(!holdings.length){
    body.innerHTML=`<div class="empty-state"><div class="empty-ico">📭</div><div class="empty-txt">No holdings yet. Add your first stock!</div></div>`;
    document.getElementById('holding-count').textContent='0 stocks';
    updateSummary(0,0);updateDonut([]);return;
  }
  let totalVal=0,totalCost=0;
  body.innerHTML=holdings.map((h,i)=>{
    const mp=MARKET_PRICES[h.tk]||{price:h.buyPrice,chg:0};
    const curPrice=mp.price,chgPct=mp.chg;
    const mktVal=curPrice*h.shares,cost=h.buyPrice*h.shares;
    const plPct=((curPrice-h.buyPrice)/h.buyPrice)*100;
    totalVal+=mktVal;totalCost+=cost;
    return `<div class="holding-row">
      <div class="h-logo">${h.tk.slice(0,4)}</div>
      <div><div class="h-name">${h.name}</div><div class="h-tk">NGX:${h.tk} · ${h.shares} shares</div></div>
      <div class="h-num">₦${curPrice.toLocaleString('en-NG',{minimumFractionDigits:2})}</div>
      <div class="h-num ${chgPct>=0?'up':'dn'}">${chgPct>=0?'▲':'▼'} ${Math.abs(chgPct).toFixed(2)}%</div>
      <div class="h-sm">₦${formatNum(mktVal)}</div>
      <div class="h-num ${plPct>=0?'up':'dn'}">${plPct>=0?'+':''}${plPct.toFixed(1)}%</div>
      <button class="del-btn" onclick="removeHolding(${i})" title="Remove">✕</button>
    </div>`;
  }).join('');
  document.getElementById('holding-count').textContent=holdings.length+' stock'+(holdings.length===1?'':'s');
  updateSummary(totalVal,totalCost);
  updateDonut(holdings.map((h,i)=>{const mp=MARKET_PRICES[h.tk]||{price:h.buyPrice};return{name:h.tk,val:mp.price*h.shares,color:ALLOC_COLORS[i%ALLOC_COLORS.length]};}));
}

function removeHolding(i){holdings.splice(i,1);saveHoldings();renderHoldings();}

function updateSummary(totalVal,totalCost){
  const gain=totalVal-totalCost,ret=totalCost>0?(gain/totalCost)*100:0;
  const el=id=>document.querySelector('#'+id+' .sum-val');
  // Update summary grid values if they exist
  const cards=document.querySelectorAll('.sum-card');
  if(cards[0])cards[0].querySelector('.sum-val').textContent='₦'+formatNum(totalVal);
  if(cards[1])cards[1].querySelector('.sum-val').textContent=(ret>=0?'+':'')+ret.toFixed(1)+'%';
  if(cards[2])cards[2].querySelector('.sum-val').textContent=holdings.length;
  if(cards[3])cards[3].querySelector('.sum-val').textContent='₦'+formatNum(totalCost);
  if(cards[4])cards[4].querySelector('.sum-val').textContent=(gain>=0?'+':'')+'₦'+formatNum(Math.abs(gain));
}

function formatNum(n){if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toFixed(0);}

function updateDonut(data){
  if(donutChart){donutChart.destroy();donutChart=null;}
  const leg=document.getElementById('alloc-legend');
  if(!data.length){leg.innerHTML='';return;}
  const total=data.reduce((a,b)=>a+b.val,0);
  leg.innerHTML=data.map(d=>`<div class="al-item"><div class="al-dot" style="background:${d.color}"></div><span class="al-name">${d.name}</span><span class="al-pct">${total>0?((d.val/total)*100).toFixed(0):'0'}%</span></div>`).join('');
  const ctx=document.getElementById('donut-chart').getContext('2d');
  donutChart=new Chart(ctx,{type:'doughnut',data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.val),backgroundColor:data.map(d=>d.color),borderWidth:2,borderColor:'#fff',hoverBorderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`${i.label}: ₦${formatNum(i.raw)}`}}}}});
}

// ─── PERF CHART ───────────────────────────────
function buildPerfChart(p){
  if(perfChart){perfChart.destroy();perfChart=null;}
  const pts={'1M':22,'3M':65,'6M':130,'1Y':252,'All':380}[p]||22;
  const base=4341000;const data=[base];
  for(let i=1;i<pts;i++)data.push(Math.max(100,data[i-1]+(Math.random()-.44)*data[i-1]*.013+data[i-1]*.0008));
  const ctx=document.getElementById('perf-chart').getContext('2d');
  perfChart=new Chart(ctx,{type:'line',data:{labels:data.map((_,i)=>i),datasets:[{data,borderColor:'#1a6eff',borderWidth:2,pointRadius:0,tension:.4,fill:true,backgroundColor:'rgba(26,110,255,.07)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>'₦'+Number(v.raw).toLocaleString('en-NG',{maximumFractionDigits:0})}}},scales:{x:{display:false},y:{ticks:{color:'#94a3b8',font:{size:10},callback:v=>'₦'+formatNum(v)},grid:{color:'#f1f5f9'}}}}});
}
function setPerfPeriod(p,btn){document.querySelectorAll('.pp').forEach(b=>b.classList.remove('on'));btn.classList.add('on');buildPerfChart(p);}

const _SB_URL  = 'https://lzlitanvlkycrkkpwczm.supabase.co'
const _SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6bGl0YW52bGt5Y3Jra3B3Y3ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODQxNjAsImV4cCI6MjA5NDQ2MDE2MH0.fjpxhBLsO4faR1SK9oSrANJ9GPX_q1IKYVOuJZyuK9g'
let _sb = null

const sbScript = document.createElement('script')
sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js'
sbScript.onload = async () => {
  _sb = supabase.createClient(_SB_URL, _SB_ANON)

  // Auth guard
  const { data: { session } } = await _sb.auth.getSession()
  if (!session) { window.location.href = 'landing.html'; return }

  // Fetch profile
  const { data: profile } = await _sb.from('profiles').select('*').eq('id', session.user.id).single()
  const firstName = profile?.first_name || profile?.name?.split(' ')[0] || 'You'
  const initials  = profile?.initials || firstName[0].toUpperCase()
  const fullName  = profile?.name || firstName

  // Update nav
  const av=document.getElementById('nav-av'); const nm=document.getElementById('nav-name')
  const hn=document.getElementById('hero-name')
  if(av) av.textContent = initials
  if(nm) nm.textContent = firstName
  if(hn) hn.textContent = fullName

  sessionStorage.setItem('gopex_user', JSON.stringify({
    id: session.user.id, name: fullName, firstName, initials, email: session.user.email,
    joined: new Date(session.user.created_at).toLocaleDateString('en-NG',{month:'long',year:'numeric'})
  }))

  // Load holdings from DB (merge with localStorage for demo data)
  const { data: dbHoldings } = await _sb.from('holdings')
    .select('*').eq('user_id', session.user.id)
  if (dbHoldings && dbHoldings.length > 0) {
    holdings = dbHoldings.map(h => ({
      tk: h.ticker, name: h.company_name,
      shares: parseFloat(h.shares), buyPrice: parseFloat(h.buy_price),
      dbId: h.id
    }))
    saveHoldings()
  }

  // Load brokerage connections from DB
  const { data: dbBrokers } = await _sb.from('brokerage_connections')
    .select('*').eq('user_id', session.user.id).eq('is_active', true)
  if (dbBrokers?.length) {
    dbBrokers.forEach(b => { connected[b.broker_name.toLowerCase()] = true })
    localStorage.setItem('gx_connected', JSON.stringify(connected))
  }

  // Override saveToDB functions
  window._saveHoldingToDB = async (holding) => {
    if (!_sb || !session) return
    const { data } = await _sb.from('holdings').insert({
      user_id: session.user.id, ticker: holding.tk,
      company_name: holding.name, shares: holding.shares, buy_price: holding.buyPrice
    }).select().single()
    return data
  }
  window._deleteHoldingFromDB = async (dbId) => {
    if (!_sb || !session || !dbId) return
    await _sb.from('holdings').delete().eq('id', dbId)
  }
  window._saveBrokerageToDB = async (brokerName) => {
    if (!_sb || !session) return
    await _sb.from('brokerage_connections').upsert({
      user_id: session.user.id, broker_name: brokerName, is_active: true
    })
    // Mark profile as verified
    await _sb.from('profiles').update({ is_verified: true }).eq('id', session.user.id)
  }

  // Brokers coming soon — always unverified for now
  const vb = document.getElementById('v-badge');
  if(vb){ vb.className='vbadge badge-uv'; vb.textContent='◌ Unverified — Broker sync coming soon'; }

  renderHoldings(); buildPerfChart('1M'); renderBrokerages()
  document.getElementById('stock-modal').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open') })
}
document.head.appendChild(sbScript)

  renderHoldings(); buildPerfChart('1M'); renderBrokerages();
  loadMarketPrices(); // fetch live prices from DB, re-renders holdings
  setInterval(loadMarketPrices, 10 * 60 * 1000); // refresh every 10 min
  document.getElementById('stock-modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
})()

function gxLogout() {
  if (!confirm('Log out of GopexFund?')) return;
  sessionStorage.clear();
  // Clear Supabase session
  const key = Object.keys(localStorage).find(k => k.includes('supabase') || k.includes('sb-'));
  if (key) localStorage.removeItem(key);

}
